name: Destroy All EC2 Instances

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DELETE to terminate ALL EC2 instances"
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "Confirmation failed"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: List EC2 Instances
        run: |
          aws ec2 describe-instances \
            --query "Reservations[*].Instances[*].[InstanceId,State.Name]" \
            --output table

      - name: Get Running EC2 Instance IDs
        id: ec2
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          echo "INSTANCE_IDS=$INSTANCE_IDS" >> $GITHUB_ENV

      - name: Terminate ALL EC2 Instances
        if: env.INSTANCE_IDS != ''
        run: |
          aws ec2 terminate-instances --instance-ids $INSTANCE_IDS

      - name: No Instances Found
        if: env.INSTANCE_IDS == ''
        run: echo "No EC2 instances found."
